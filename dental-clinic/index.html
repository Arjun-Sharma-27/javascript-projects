<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sharma Dental Clinic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
   <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>

<header>
    <div class="container">
    <div class="logo">🦷 Sharma Dental Care</div>
    <div class="menu-toggle" id="menu-toggle">☰</div>
    <nav id="nav">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#appointment">Appointment</a>
    </nav>
    </div>
</header>

<section class="hero" id="home">
    <h1>Healthy Smile, Happy Life</h1>
    <p>Professional & Affordable Dental Care</p>
    <a href="#appointment" class="btn">Book Appointment</a>
</section>

<section class="services" id="services">
    <h2>Our Services</h2>
    <div class="service-container">
        <div class="card">🦷 Teeth Cleaning</div>
        <div class="card">😁 Teeth Whitening</div>
        <div class="card">🛠 Root Canal</div>
        <div class="card">🦷 Braces & Aligners</div>
    </div>
</section>

<section class="appointment" id="appointment">
    <h2>Book Appointment</h2>
    <form id="appointmentForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <input type="date" id="date" required>
        <input type="time" id="time" required>
        <textarea id="problem" placeholder="Describe your problem" required></textarea>
        <button type="submit">Send via WhatsApp</button>
    </form>
</section>
<footer>
    <p>© 2026 SmileCare Dental Clinic</p>
</footer>
</body>
</html>
